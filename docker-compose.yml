services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arxi
      POSTGRES_USER: arxi
      POSTGRES_PASSWORD: arxi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://arxi:arxi@postgres:5432/arxi
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - postgres
      - redis
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    # Note: NEXT_PUBLIC_API_URL is baked at build time in the Dockerfile.
    # Runtime env vars have no effect on Next.js public vars.
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
